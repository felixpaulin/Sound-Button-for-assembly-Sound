<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Button</title>
    <style>
        body { 
            font-family: sans-serif; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            background: #121212; 
            color: white; 
        }
        button { 
            padding: 20px 40px; 
            font-size: 24px; 
            cursor: pointer; 
            border-radius: 50px; 
            border: none; 
            background: #00b790ec; 
            color: white; 
            transition: transform 0.1s; 
        }
        button:active { transform: scale(0.95); }
    </style>
</head>
<body>
    <h1>Press it, trust</h1>
    <button id="soundBtn">Click me</button>
    <audio id="audio" src="Ghost_voice.mp3" preload="auto"></audio>

    <script src="main.js"></script>
</body>
</html>
